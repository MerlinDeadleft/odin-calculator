<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main>
        <div class="calculator-container">
            <div class="buttons-container">
                <div class="buttons-row">
                    <button class="button clear">Clear</button>
                    <button class="button operator">÷</button>
                </div>

                <div class="buttons-row">
                    <button class="button">7</button>
                    <button class="button">8</button>
                    <button class="button">9</button>
                    <button class="button operator">&#xD7</button> <!-- &#xD7 = × (multiplication sign. VS Code show ambiguity warning with x if pasted directly)-->
                </div>

                <div class="buttons-row">
                    <button class="button">4</button>
                    <button class="button">5</button>
                    <button class="button">6</button>
                    <button class="button operator">&#x2212</button> <!-- &#x2212 = − (minus sign. VS Code show ambiguity warning with - (dash) if pasted directly)-->
                </div>

                <div class="buttons-row">
                    <button class="button">1</button>
                    <button class="button">2</button>
                    <button class="button">3</button>
                    <button class="button operator">+</button>
                </div>

                <div class="buttons-row">
                    <button class="button">±</button>
                    <button class="button">0</button>
                    <button class="button">,</button>
                    <button class="button operator">=</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
